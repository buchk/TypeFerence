<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="350" viewBox="0 0 1000 350" role="img" aria-labelledby="title desc">
  <title id="title">Cross-agent interaction</title><desc id="desc">An executive assistant asks a specialized repository agent for evidence and incorporates the result into a brief.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#646b88"/></marker><style>.box{fill:#f7f8fc;stroke:#4455aa;stroke-width:2}.accent{fill:#f1e9ff;stroke:#8154b5;stroke-width:2}.t{font:600 17px sans-serif;fill:#171a2b}.s{font:13px sans-serif;fill:#555b75}.line{stroke:#646b88;stroke-width:2;fill:none;marker-end:url(#a)}.dash{stroke-dasharray:7 6}</style></defs>
  <rect class="box" x="35" y="80" rx="12" width="250" height="90"/><text class="t" x="160" y="116" text-anchor="middle">Executive assistant</text><text class="s" x="160" y="143" text-anchor="middle">owns the decision brief</text>
  <rect class="accent" x="375" y="80" rx="12" width="250" height="90"/><text class="t" x="500" y="116" text-anchor="middle">TypeFerence MCP</text><text class="s" x="500" y="143" text-anchor="middle">typed dispatch boundary</text>
  <rect class="box" x="715" y="80" rx="12" width="250" height="90"/><text class="t" x="840" y="116" text-anchor="middle">Payments repo agent</text><text class="s" x="840" y="143" text-anchor="middle">owns repository evidence</text>
  <path class="line" d="M285 105H375"/><text class="s" x="330" y="92" text-anchor="middle">request</text><path class="line" d="M625 105H715"/>
  <path class="line dash" d="M715 150H625"/><path class="line dash" d="M375 150H285"/><text class="s" x="500" y="204" text-anchor="middle">resolved instructions + context + provenance</text>
  <rect class="accent" x="260" y="245" rx="12" width="480" height="70"/><text class="t" x="500" y="275" text-anchor="middle">Evidence-backed executive brief</text><text class="s" x="500" y="298" text-anchor="middle">distinct responsibilities, shared enterprise coherence</text>
  <path class="line" d="M160 170V280H260"/>
</svg>
