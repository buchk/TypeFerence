<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="330" viewBox="0 0 1000 330" role="img" aria-labelledby="title desc">
  <title id="title">Polymorphic skill dispatch</title><desc id="desc">A derived MCP tool call resolves a base contract to a specialized implementation and returns an invocation package.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#646b88"/></marker><style>.box{fill:#f7f8fc;stroke:#4455aa;stroke-width:2}.accent{fill:#f1e9ff;stroke:#8154b5;stroke-width:2}.dark{fill:#171a2b}.t{font:600 17px sans-serif;fill:#171a2b}.w{fill:white}.s{font:13px sans-serif;fill:#555b75}.line{stroke:#646b88;stroke-width:2;fill:none;marker-end:url(#a)}</style></defs>
  <rect class="box" x="20" y="120" rx="12" width="245" height="90"/><text class="t" x="142" y="153" text-anchor="middle">MCP call</text><text class="s" x="142" y="179" text-anchor="middle">payments-repo-agent.</text><text class="s" x="142" y="197" text-anchor="middle">repository-status</text>
  <path class="line" d="M265 165H340"/><rect class="dark" x="340" y="105" rx="12" width="250" height="120"/><text class="t w" x="465" y="139" text-anchor="middle">Resolve contract</text><text class="s w" x="465" y="166" text-anchor="middle">repository-status@1.0.0</text><text class="s w" x="465" y="194" text-anchor="middle">nearest compatible override</text>
  <path class="line" d="M590 165H665"/><rect class="accent" x="665" y="55" rx="12" width="315" height="220"/><text class="t" x="822" y="91" text-anchor="middle">Invocation package</text><text class="s" x="705" y="126">- specialized instructions</text><text class="s" x="705" y="154">- validated arguments</text><text class="s" x="705" y="182">- conditional context</text><text class="s" x="705" y="210">- target hints</text><text class="s" x="705" y="238">- source provenance</text>
</svg>
