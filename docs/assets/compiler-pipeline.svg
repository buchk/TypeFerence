<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="310" viewBox="0 0 1000 310" role="img" aria-labelledby="title desc">
  <title id="title">TypeFerence compiler pipeline</title><desc id="desc">Typed YAML is validated and resolved to an intermediate representation, then emitted through native adapters.</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#646b88"/></marker><style>.box{fill:#f7f8fc;stroke:#4455aa;stroke-width:2}.mid{fill:#171a2b;stroke:#171a2b}.target{fill:#f1e9ff;stroke:#8154b5;stroke-width:2}.t{font:600 17px sans-serif;fill:#171a2b}.w{fill:white}.s{font:13px sans-serif;fill:#555b75}.line{stroke:#646b88;stroke-width:2;fill:none;marker-end:url(#a)}</style></defs>
  <rect class="box" x="30" y="105" rx="12" width="170" height="90"/><text class="t" x="115" y="139" text-anchor="middle">Typed YAML</text><text class="s" x="115" y="164" text-anchor="middle">agents, interfaces, skills</text>
  <path class="line" d="M200 150H275"/><rect class="box" x="275" y="105" rx="12" width="170" height="90"/><text class="t" x="360" y="139" text-anchor="middle">Validate</text><text class="s" x="360" y="164" text-anchor="middle">capabilities and paths</text>
  <path class="line" d="M445 150H520"/><rect class="mid" x="520" y="105" rx="12" width="210" height="90"/><text class="t w" x="625" y="139" text-anchor="middle">Resolved IR</text><text class="s w" x="625" y="164" text-anchor="middle">behavior plus provenance</text>
  <path class="line" d="M730 150H790V48H825"/><path class="line" d="M790 150H825"/><path class="line" d="M790 150V252H825"/>
  <rect class="target" x="825" y="15" rx="10" width="145" height="66"/><text class="t" x="897" y="55" text-anchor="middle">Codex</text>
  <rect class="target" x="825" y="117" rx="10" width="145" height="66"/><text class="t" x="897" y="157" text-anchor="middle">Copilot</text>
  <rect class="target" x="825" y="219" rx="10" width="145" height="66"/><text class="t" x="897" y="259" text-anchor="middle">Cursor + MCP</text>
