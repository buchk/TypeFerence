<svg xmlns="http://www.w3.org/2000/svg" width="960" height="470" viewBox="0 0 960 470" role="img" aria-labelledby="title desc">
  <title id="title">TypeFerence type hierarchy</title><desc id="desc">System object leads to a Helio enterprise base, then person and repository lineages.</desc>
  <defs><style>.box{fill:#f7f8fc;stroke:#4455aa;stroke-width:2}.root{fill:#171a2b;stroke:#171a2b}.org{fill:#e9ecff}.leaf{fill:#f1e9ff}.t{font:600 18px sans-serif;fill:#171a2b}.w{fill:white}.s{font:14px sans-serif;fill:#555b75}.line{stroke:#6e7390;stroke-width:2;fill:none}</style></defs>
  <path class="line" d="M480 84V120M480 190V225M480 225H245V260M480 225H715V260M245 330V370M715 330V370"/>
  <rect class="box root" x="340" y="20" rx="12" width="280" height="64"/><text class="t w" x="480" y="48" text-anchor="middle">system/object</text><text class="s w" x="480" y="69" text-anchor="middle">mechanics only - no behavior</text>
  <rect class="box org" x="330" y="120" rx="12" width="300" height="70"/><text class="t" x="480" y="149" text-anchor="middle">helio/enterprise-agent</text><text class="s" x="480" y="172" text-anchor="middle">identity, governance, shared norms</text>
  <rect class="box" x="105" y="260" rx="12" width="280" height="70"/><text class="t" x="245" y="289" text-anchor="middle">helio/person-agent</text><text class="s" x="245" y="312" text-anchor="middle">inbound and outbound assistance</text>
  <rect class="box" x="575" y="260" rx="12" width="280" height="70"/><text class="t" x="715" y="289" text-anchor="middle">helio/repo-agent</text><text class="s" x="715" y="312" text-anchor="middle">evidence-backed repository work</text>
  <rect class="box leaf" x="105" y="370" rx="12" width="280" height="70"/><text class="t" x="245" y="399" text-anchor="middle">executive-assistant</text><text class="s" x="245" y="422" text-anchor="middle">briefings and coordination</text>
  <rect class="box leaf" x="575" y="370" rx="12" width="280" height="70"/><text class="t" x="715" y="399" text-anchor="middle">payments-repo-agent</text><text class="s" x="715" y="422" text-anchor="middle">compatible skill override</text>
</svg>
